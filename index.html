<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WA Intel">
    <title>West Asia Intel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ── RESET & BASE ─────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

        :root {
            --bg-1:#03060f;
            --bg-2:#070d1c;
            --glass-bg:rgba(255,255,255,0.035);
            --glass-bg-strong:rgba(255,255,255,0.065);
            --glass-border:rgba(255,255,255,0.08);
            --glass-border-strong:rgba(255,255,255,0.14);
            --primary:#1d6ef5;
            --primary-glow:rgba(29,110,245,0.3);
            --uae:#00c48c;
            --uae-glow:rgba(0,196,140,0.25);
            --gcc:#f5a623;
            --gcc-glow:rgba(245,166,35,0.25);
            --urgent:#e8354a;
            --urgent-glow:rgba(232,53,74,0.3);
            --text:#e8f0fe;
            --text-muted:#8899bb;
            --text-dim:#4a5a7a;
            --ff-display:'Bebas Neue', sans-serif;
            --ff-body:'DM Sans', sans-serif;
            --ff-mono:'DM Mono', monospace;
        }

        html { scroll-behavior:smooth; }

        body {
            font-family:var(--ff-body);
            background:var(--bg-1);
            color:var(--text);
            min-height:100vh;
            padding-top:env(safe-area-inset-top);
            overflow-x:hidden;
        }

        /* ── ANIMATED BACKGROUND ──────────────────────────────────────── */
        .bg-orbs {
            position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
        }
        .orb {
            position:absolute; border-radius:50%;
            filter:blur(80px); opacity:0.18;
            animation:orbFloat 20s ease-in-out infinite;
        }
        .orb-1 { width:500px;height:500px; background:radial-gradient(circle,#1d4ed8,transparent); top:-100px; left:-100px; animation-delay:0s; }
        .orb-2 { width:400px;height:400px; background:radial-gradient(circle,#0f766e,transparent); bottom:-80px; right:-80px; animation-delay:-7s; }
        .orb-3 { width:300px;height:300px; background:radial-gradient(circle,#7c2d12,transparent); top:40%; left:60%; animation-delay:-14s; }
        @keyframes orbFloat {
            0%,100% { transform:translate(0,0) scale(1); }
            33%      { transform:translate(30px,-20px) scale(1.05); }
            66%      { transform:translate(-20px,30px) scale(0.95); }
        }

        /* Subtle grid overlay */
        .bg-grid {
            position:fixed; inset:0; z-index:0; pointer-events:none;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size:60px 60px;
        }

        /* ── STICKY CHROME ────────────────────────────────────────────── */
        .chrome {
            position:sticky; top:0; z-index:100;
            background:rgba(3,6,15,0.7);
            backdrop-filter:blur(24px) saturate(180%);
            -webkit-backdrop-filter:blur(24px) saturate(180%);
            border-bottom:1px solid var(--glass-border);
        }

        /* ── HEADER ───────────────────────────────────────────────────── */
        .header {
            padding:14px 20px 10px;
        }
        .header-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }

        .brand { display:flex; align-items:center; gap:10px; }
        .brand-icon {
            width:32px; height:32px;
            background:linear-gradient(135deg, var(--primary), #0ea5e9);
            border-radius:8px;
            display:flex; align-items:center; justify-content:center;
            font-size:16px;
            box-shadow:0 0 16px var(--primary-glow);
        }
        .brand-name {
            font-family:var(--ff-display);
            font-size:1.5rem;
            letter-spacing:3px;
            color:#fff;
            line-height:1;
        }
        .brand-sub {
            font-size:0.55rem;
            letter-spacing:3px;
            color:var(--text-dim);
            text-transform:uppercase;
            margin-top:2px;
        }

        .header-right { display:flex; align-items:center; gap:10px; }
        .day-pill {
            display:flex; align-items:center; gap:5px;
            background:rgba(232,53,74,0.12);
            border:1px solid rgba(232,53,74,0.25);
            border-radius:20px;
            padding:4px 10px;
            font-family:var(--ff-mono);
            font-size:0.62rem;
            color:var(--urgent);
            letter-spacing:1px;
        }
        .pulse {
            width:5px; height:5px; background:var(--urgent); border-radius:50%;
            animation:pulseBeat 1.4s ease infinite;
        }
        @keyframes pulseBeat {
            0%,100%{opacity:1;transform:scale(1)}
            50%{opacity:0.3;transform:scale(0.6)}
        }

        .meta-strip {
            display:flex; justify-content:space-between; align-items:center;
            font-size:0.62rem; color:var(--text-dim); gap:8px; flex-wrap:wrap;
        }
        .status-badge {
            display:inline-flex; align-items:center; gap:4px;
            font-family:var(--ff-mono);
        }
        .status-led {
            width:5px; height:5px; border-radius:50%;
            background:var(--text-dim);
            transition:background 0.4s;
        }

        /* ── ALERT BANNER ──────────────────────────────────────────────── */
        .alert-bar {
            margin:0 20px 10px;
            background:linear-gradient(90deg, rgba(232,53,74,0.15), rgba(232,53,74,0.05));
            border:1px solid rgba(232,53,74,0.3);
            border-radius:8px;
            padding:8px 14px;
            font-size:0.75rem;
            font-weight:500;
            color:#fca5a5;
            display:none;
            animation:alertSlide 0.3s ease;
        }
        .alert-bar.show { display:flex; align-items:center; gap:8px; }
        @keyframes alertSlide { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

        /* ── FILTER + CONTROLS ─────────────────────────────────────────── */
        .controls-row {
            display:flex; align-items:center; gap:8px;
            padding:8px 20px;
            border-top:1px solid var(--glass-border);
            overflow-x:auto; -webkit-overflow-scrolling:touch;
        }
        .controls-row::-webkit-scrollbar { display:none; }

        .filter-btn {
            flex-shrink:0;
            background:var(--glass-bg);
            border:1px solid var(--glass-border);
            color:var(--text-muted);
            font-family:var(--ff-body);
            font-size:0.75rem;
            font-weight:500;
            padding:5px 14px;
            border-radius:20px;
            cursor:pointer;
            transition:all 0.2s;
            -webkit-tap-highlight-color:transparent;
            white-space:nowrap;
        }
        .filter-btn:hover { background:var(--glass-bg-strong); color:var(--text); }
        .filter-btn.active { color:#fff; font-weight:600; }
        .filter-btn[data-cat="All"].active    { background:rgba(29,110,245,0.25);  border-color:rgba(29,110,245,0.5);  box-shadow:0 0 12px rgba(29,110,245,0.2); }
        .filter-btn[data-cat="UAE"].active    { background:rgba(0,196,140,0.2);    border-color:rgba(0,196,140,0.5);   box-shadow:0 0 12px var(--uae-glow); }
        .filter-btn[data-cat="GCC"].active    { background:rgba(245,166,35,0.2);   border-color:rgba(245,166,35,0.5);  box-shadow:0 0 12px var(--gcc-glow); color:#f5a623; }
        .filter-btn[data-cat="Global"].active { background:rgba(232,53,74,0.18);   border-color:rgba(232,53,74,0.4);   box-shadow:0 0 12px var(--urgent-glow); }

        .divider-v { width:1px; height:20px; background:var(--glass-border); flex-shrink:0; }

        /* Auto-refresh selector */
        .refresh-select {
            flex-shrink:0;
            background:var(--glass-bg);
            border:1px solid var(--glass-border);
            color:var(--text-muted);
            font-family:var(--ff-mono);
            font-size:0.68rem;
            padding:5px 8px;
            border-radius:8px;
            cursor:pointer;
            outline:none;
            -webkit-appearance:none;
        }
        .refresh-select:focus { border-color:rgba(29,110,245,0.4); }

        .refresh-btn {
            flex-shrink:0;
            display:flex; align-items:center; gap:5px;
            background:rgba(29,110,245,0.18);
            border:1px solid rgba(29,110,245,0.4);
            color:#60a5fa;
            font-family:var(--ff-body);
            font-size:0.75rem;
            font-weight:600;
            padding:5px 14px;
            border-radius:20px;
            cursor:pointer;
            white-space:nowrap;
            transition:all 0.2s;
            -webkit-tap-highlight-color:transparent;
        }
        .refresh-btn:disabled { opacity:0.4; cursor:not-allowed; }
        .refresh-btn:not(:disabled):hover { background:rgba(29,110,245,0.3); }

        @keyframes spin { to{transform:rotate(360deg)} }
        .spinning { animation:spin 0.8s linear infinite; display:inline-block; }

        /* Progress bar for auto-refresh */
        .progress-bar {
            height:2px;
            background:rgba(29,110,245,0.15);
            position:relative;
            overflow:hidden;
        }
        .progress-fill {
            height:100%;
            background:linear-gradient(90deg,var(--primary),#0ea5e9);
            width:0%;
            transition:width 1s linear;
            box-shadow:0 0 8px var(--primary-glow);
        }

        /* ── FEED ─────────────────────────────────────────────────────── */
        #feed { padding:16px 16px 120px; position:relative; z-index:1; }

        /* ── STATUS ROW ───────────────────────────────────────────────── */
        .status-row {
            display:flex; align-items:center; gap:8px;
            font-family:var(--ff-mono);
            font-size:0.65rem;
            color:var(--text-dim);
            margin-bottom:14px;
            padding:0 4px;
        }
        .status-text { flex:1; }
        .status-text.ok   { color:var(--uae); }
        .status-text.warn { color:var(--gcc); }
        .status-text.err  { color:var(--urgent); }

        /* ── CARDS ────────────────────────────────────────────────────── */
        @keyframes cardIn {
            from { opacity:0; transform:translateY(12px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .news-card {
            background:var(--glass-bg);
            backdrop-filter:blur(16px) saturate(140%);
            -webkit-backdrop-filter:blur(16px) saturate(140%);
            border:1px solid var(--glass-border);
            border-radius:16px;
            margin-bottom:12px;
            overflow:hidden;
            transition:transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            animation:cardIn 0.3s ease both;
            cursor:pointer;
        }
        .news-card:hover {
            transform:translateY(-2px);
            border-color:var(--glass-border-strong);
            box-shadow:0 8px 32px rgba(0,0,0,0.4);
        }
        .news-card.uae    { border-left:3px solid var(--uae);    box-shadow:inset 3px 0 20px rgba(0,196,140,0.05); }
        .news-card.gcc    { border-left:3px solid var(--gcc);    box-shadow:inset 3px 0 20px rgba(245,166,35,0.05); }
        .news-card.global { border-left:3px solid var(--primary);box-shadow:inset 3px 0 20px rgba(29,110,245,0.05); }
        .news-card.urgent {
            border-left:3px solid var(--urgent);
            background:rgba(232,53,74,0.06);
            box-shadow:0 0 24px rgba(232,53,74,0.12), inset 3px 0 20px rgba(232,53,74,0.08);
        }

        /* Card with image */
        .card-image-wrap {
            position:relative;
            height:180px;
            overflow:hidden;
            background:var(--bg-2);
        }
        .card-image-wrap img {
            width:100%; height:100%;
            object-fit:cover;
            transition:transform 0.4s ease;
        }
        .news-card:hover .card-image-wrap img { transform:scale(1.03); }
        .card-image-overlay {
            position:absolute; inset:0;
            background:linear-gradient(to top, rgba(3,6,15,0.85) 0%, transparent 60%);
        }
        .card-image-tag {
            position:absolute; top:10px; left:10px;
        }

        /* Card body */
        .card-body { padding:14px 16px 12px; }
        .card-body.with-image { padding-top:10px; }

        .card-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; gap:8px; flex-wrap:wrap; }

        .tag {
            display:inline-flex; align-items:center; gap:4px;
            font-family:var(--ff-mono);
            font-size:0.6rem; font-weight:500;
            letter-spacing:1.5px; text-transform:uppercase;
            padding:3px 8px;
            border-radius:6px;
            border:1px solid transparent;
        }
        .tag.uae    { color:var(--uae);    background:rgba(0,196,140,0.1);  border-color:rgba(0,196,140,0.2); }
        .tag.gcc    { color:var(--gcc);    background:rgba(245,166,35,0.1); border-color:rgba(245,166,35,0.2); }
        .tag.global { color:#60a5fa;       background:rgba(29,110,245,0.1); border-color:rgba(29,110,245,0.2); }
        .tag.urgent { color:#fff;          background:rgba(232,53,74,0.2);  border-color:rgba(232,53,74,0.4); }

        .card-time-source {
            font-family:var(--ff-mono);
            font-size:0.58rem;
            color:var(--text-dim);
            text-align:right;
            line-height:1.5;
        }

        .card-title {
            font-family:var(--ff-display);
            font-size:1.15rem;
            letter-spacing:0.5px;
            color:#fff;
            line-height:1.25;
            margin-bottom:8px;
        }
        .card-title a {
            color:inherit; text-decoration:none;
        }
        .card-title a:hover { color:var(--text); }

        .card-content {
            font-size:0.83rem;
            color:var(--text-muted);
            line-height:1.65;
            margin-bottom:10px;
        }

        .card-footer { display:flex; align-items:center; justify-content:space-between; }
        .read-more {
            font-family:var(--ff-mono);
            font-size:0.65rem;
            color:var(--primary);
            text-decoration:none;
            letter-spacing:0.5px;
            display:flex; align-items:center; gap:4px;
            transition:color 0.2s, gap 0.2s;
        }
        .read-more:hover { color:#93c5fd; gap:6px; }

        /* ── SKELETON ─────────────────────────────────────────────────── */
        .skeleton {
            background:linear-gradient(90deg, var(--glass-bg) 25%, var(--glass-bg-strong) 50%, var(--glass-bg) 75%);
            background-size:200% 100%;
            animation:shimmer 1.4s ease infinite;
            border-radius:16px;
            margin-bottom:12px;
            border:1px solid var(--glass-border);
        }
        .sk-image { height:160px; border-radius:16px 16px 0 0; }
        .sk-body { padding:14px 16px; }
        .sk-line { height:10px; border-radius:4px; background:rgba(255,255,255,0.05); margin-bottom:8px; }
        .sk-line.wide { width:85%; }
        .sk-line.med  { width:60%; }
        .sk-line.short{ width:40%; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* ── EMPTY / ERROR ────────────────────────────────────────────── */
        .empty-state {
            text-align:center;
            padding:60px 20px;
            color:var(--text-dim);
        }
        .empty-icon {
            font-size:2.5rem; margin-bottom:16px;
            filter:grayscale(0.5);
        }
        .empty-title {
            font-family:var(--ff-display);
            font-size:1.4rem;
            letter-spacing:2px;
            color:var(--text-muted);
            margin-bottom:8px;
        }
        .empty-sub { font-size:0.82rem; line-height:1.7; }

        /* ── FOOTER ───────────────────────────────────────────────────── */
        .feed-footer {
            text-align:center;
            font-family:var(--ff-mono);
            font-size:0.6rem;
            color:var(--text-dim);
            padding:12px 10px 4px;
            line-height:1.9;
            opacity:0.6;
        }
    </style>
</head>
<body>

<!-- Ambient background -->
<div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>
<div class="bg-grid"></div>

<!-- ── STICKY CHROME ───────────────────────────────────────────── -->
<div class="chrome">

    <!-- Header -->
    <div class="header">
        <div class="header-row">
            <div class="brand">
                <div class="brand-icon">⚡</div>
                <div>
                    <div class="brand-name">West Asia Intel</div>
                    <div class="brand-sub">Live Intelligence Feed</div>
                </div>
            </div>
            <div class="header-right">
                <div class="day-pill">
                    <div class="pulse"></div>
                    <span id="day-label">LIVE</span>
                </div>
            </div>
        </div>

        <!-- Alert banner -->
        <div class="alert-bar" id="alert-bar"></div>

        <!-- Meta strip -->
        <div class="meta-strip">
            <span class="status-badge">
                <span class="status-led" id="status-led"></span>
                <span id="meta-source">Connecting…</span>
            </span>
            <span id="last-updated" style="font-family:var(--ff-mono)">–</span>
        </div>
    </div>

    <!-- Filter + Controls row -->
    <div class="controls-row">
        <button class="filter-btn active" data-cat="All"    onclick="doFilter(this,'All')">All</button>
        <button class="filter-btn"        data-cat="UAE"    onclick="doFilter(this,'UAE')">🇦🇪 UAE</button>
        <button class="filter-btn"        data-cat="GCC"    onclick="doFilter(this,'GCC')">🛢 Gulf</button>
        <button class="filter-btn"        data-cat="Global" onclick="doFilter(this,'Global')">🌐 Global</button>

        <div class="divider-v"></div>

        <select class="refresh-select" id="refresh-select" onchange="onFreqChange()">
            <option value="5">↺ 5 min</option>
            <option value="15" selected>↺ 15 min</option>
            <option value="30">↺ 30 min</option>
            <option value="60">↺ 60 min</option>
            <option value="0">↺ Manual</option>
        </select>

        <button class="refresh-btn" id="refresh-btn" onclick="doRefresh()">
            <span id="refresh-icon">↺</span><span id="refresh-label">Refresh</span>
        </button>
    </div>

    <!-- Auto-refresh progress bar -->
    <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
    </div>
</div>

<!-- ── FEED ────────────────────────────────────────────────────── -->
<main id="feed"></main>

<script>
// ── RSS FEEDS (confirmed working, NO &count= param) ──────────────────────────
const RSS_FEEDS = [
    { name:'Al Jazeera',   url:'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.aljazeera.com%2Fxml%2Frss%2Fall.xml' },
    { name:'BBC Mid East', url:'https://api.rss2json.com/v1/api.json?rss_url=http%3A%2F%2Ffeeds.bbci.co.uk%2Fnews%2Fworld%2Fmiddle_east%2Frss.xml' },
    { name:'Guardian',     url:'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.theguardian.com%2Fworld%2Fmiddleeast%2Frss' },
    { name:'Arab News',    url:'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.arabnews.com%2Fcat%2F2%2Frss.xml' },
    { name:'France 24',    url:'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.france24.com%2Fen%2Frss' },
    { name:'The New Arab', url:'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.newarab.com%2Frss' },
    { name:'The National', url:'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.thenationalnews.com%2Frss' },
];

const KEYWORDS = [
    'iran','israel','west asia','middle east','hormuz','gulf','hezbollah',
    'tehran','hamas','gaza','lebanon','missile','strike','war','crude','brent',
    'trump','netanyahu','irgc','natanz','strait','nuclear','ceasefire',
    'qatar','bahrain','kuwait','houthi','saudi','riyadh','pentagon',
    'attack','conflict','military','airstrike','drone','bomb',
    'oil','gas','energy','sanction','casualt','killed','dead','wounded',
    'uae','dubai','abu dhabi','mena','ras al-khaimah','minhad'
];

// ── STATE ────────────────────────────────────────────────────────────────────
let currentFilter = 'All';
let currentCards  = [];
let workingFeeds  = [];
let autoTimer     = null;
let progressTimer = null;
let freqMinutes   = 15;
let nextRefreshAt = null;

// ── HELPERS ──────────────────────────────────────────────────────────────────
function stripHTML(h) { return (h||'').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim(); }
function escHTML(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function setDayLabel() {
    const start = new Date('2026-02-28');
    const day   = Math.max(1, Math.floor((Date.now()-start)/86400000)+1);
    document.getElementById('day-label').textContent = 'DAY ' + day;
}

function fmtTime(ts) {
    if (!ts) return '–';
    return new Date(ts).toLocaleTimeString('en-AE',{hour:'2-digit',minute:'2-digit',hour12:false})+' UAE';
}

function fmtDate(str) {
    if (!str) return '';
    const d = new Date(str);
    if (isNaN(d)) return '';
    const now = new Date();
    const diff = Math.floor((now - d) / 60000);
    if (diff < 1)  return 'just now';
    if (diff < 60) return diff + 'm ago';
    if (diff < 1440) return Math.floor(diff/60) + 'h ago';
    return d.toLocaleDateString('en-AE',{day:'numeric',month:'short'});
}

// ── AUTO-REFRESH ──────────────────────────────────────────────────────────────
function startAutoRefresh() {
    clearInterval(autoTimer);
    clearInterval(progressTimer);
    const fill = document.getElementById('progress-fill');
    fill.style.width = '0%';
    fill.style.transition = 'none';

    if (freqMinutes === 0) { fill.style.width='0%'; return; }

    nextRefreshAt = Date.now() + freqMinutes * 60 * 1000;

    // Animate progress bar
    requestAnimationFrame(() => {
        fill.style.transition = `width ${freqMinutes * 60}s linear`;
        fill.style.width = '100%';
    });

    autoTimer = setTimeout(() => {
        doRefresh();
    }, freqMinutes * 60 * 1000);
}

function onFreqChange() {
    freqMinutes = parseInt(document.getElementById('refresh-select').value);
    startAutoRefresh();
}

// ── RSS FETCH ────────────────────────────────────────────────────────────────
function isRelevant(item) {
    const t = ((item.title||'')+(item.description||'')).toLowerCase();
    return KEYWORDS.some(k => t.includes(k));
}

async function fetchOneFeed(feed) {
    const res = await fetch(feed.url, { cache:'no-store' });
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    if (data.status !== 'ok') throw new Error(data.message || 'Feed error');
    return (data.items||[]).map(i => ({ ...i, _source:feed.name }));
}

async function fetchAllFeeds() {
    const results = await Promise.allSettled(RSS_FEEDS.map(fetchOneFeed));

    let allItems = [];
    workingFeeds = [];

    results.forEach((r, i) => {
        if (r.status === 'fulfilled') {
            allItems.push(...r.value);
            workingFeeds.push(RSS_FEEDS[i].name);
        } else {
            console.warn(RSS_FEEDS[i].name+' failed:', r.reason.message);
        }
    });

    if (workingFeeds.length === 0) throw new Error('All feeds unavailable — check network.');

    // Deduplicate by title
    const seen = new Set();
    allItems = allItems.filter(i => {
        if (!i.title || seen.has(i.title)) return false;
        seen.add(i.title); return true;
    });

    // Filter relevant
    let filtered = allItems.filter(isRelevant)
        .sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate));

    // Safety net: if too few matches, show all feed items (already ME-focused)
    if (filtered.length < 5) {
        filtered = allItems.sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate));
    }

    return filtered;
}

// ── CATEGORISE ───────────────────────────────────────────────────────────────
function categorise(item) {
    const t = ((item.title||'')+(item.description||'')).toLowerCase();
    const urgent = [
        'ultimatum','nuclear strike','ballistic missile','killed','airstrike on','bombed',
        'attack on','ceasefire','casualties','dead','wounded','explosion','obliterate'
    ].some(k => t.includes(k));

    let cat = 'Global';
    if (['uae','dubai','abu dhabi','al minhad','minhad','ras al-khaimah','rak','emirates','emirati'].some(k=>t.includes(k))) cat = 'UAE';
    else if (['kuwait','bahrain','qatar','saudi','hormuz','ras laffan','houthi','gcc','riyadh','jeddah','persian gulf'].some(k=>t.includes(k))) cat = 'GCC';

    return { cat, urgent };
}

function buildCards(items) {
    return items.map(item => {
        const { cat, urgent } = categorise(item);
        const thumb = item.thumbnail || item.enclosure?.link || null;
        return {
            cat, urgent,
            title:   item.title || 'Untitled',
            content: stripHTML(item.description).slice(0,280) + (stripHTML(item.description).length > 280 ? '…' : ''),
            time:    fmtDate(item.pubDate),
            source:  item._source || '',
            link:    item.link || null,
            image:   thumb && thumb.startsWith('http') ? thumb : null,
        };
    });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
    const feed    = document.getElementById('feed');
    const showAll = currentFilter === 'All';
    const cards   = showAll ? currentCards : currentCards.filter(c => c.cat === currentFilter);

    feed.innerHTML = '';

    if (!cards.length) {
        feed.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">📡</div>
                <div class="empty-title">No Articles Found</div>
                <div class="empty-sub">
                    ${currentCards.length ? 'No articles in this category. Try "All".' : 'Tap Refresh to load live news.'}
                </div>
            </div>`;
        return;
    }

    // Staggered animation
    cards.forEach((card, idx) => {
        const div = document.createElement('div');
        const cl  = card.cat.toLowerCase();
        div.className = `news-card ${cl}${card.urgent ? ' urgent' : ''}`;
        div.style.animationDelay = (idx * 40) + 'ms';

        const tagHtml = `<span class="tag ${card.urgent ? 'urgent' : cl}">${card.urgent ? '🚨 BREAKING' : card.cat.toUpperCase()}</span>`;
        const metaHtml = `
            <div class="card-time-source">
                <div>${escHTML(card.time)}</div>
                <div>${escHTML(card.source)}</div>
            </div>`;
        const titleHtml = card.link
            ? `<a href="${escHTML(card.link)}" target="_blank" rel="noopener">${escHTML(card.title)}</a>`
            : escHTML(card.title);
        const footerHtml = card.link
            ? `<a class="read-more" href="${escHTML(card.link)}" target="_blank" rel="noopener">Full story <span>→</span></a>`
            : '';

        if (card.image) {
            div.innerHTML = `
                <div class="card-image-wrap">
                    <img src="${escHTML(card.image)}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'">
                    <div class="card-image-overlay"></div>
                    <div class="card-image-tag">${tagHtml}</div>
                </div>
                <div class="card-body with-image">
                    <div class="card-meta">
                        <div></div>
                        ${metaHtml}
                    </div>
                    <div class="card-title">${titleHtml}</div>
                    <div class="card-content">${escHTML(card.content)}</div>
                    <div class="card-footer">${footerHtml}</div>
                </div>`;
        } else {
            div.innerHTML = `
                <div class="card-body">
                    <div class="card-meta">
                        ${tagHtml}
                        ${metaHtml}
                    </div>
                    <div class="card-title">${titleHtml}</div>
                    <div class="card-content">${escHTML(card.content)}</div>
                    <div class="card-footer">${footerHtml}</div>
                </div>`;
        }

        feed.appendChild(div);
    });

    feed.innerHTML += `<div class="feed-footer">
        ${workingFeeds.join(' · ')}<br>
        ${currentCards.length} articles · Auto-categorised by keyword · Tap Refresh or set interval above
    </div>`;
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function doFilter(btn, cat) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = cat;
    render();
}

// ── SKELETONS ─────────────────────────────────────────────────────────────────
function showSkeletons() {
    document.getElementById('feed').innerHTML = [1,2,3].map(() => `
        <div class="skeleton">
            <div class="sk-image"></div>
            <div class="sk-body">
                <div class="sk-line short" style="margin-bottom:12px"></div>
                <div class="sk-line wide"></div>
                <div class="sk-line wide"></div>
                <div class="sk-line med"></div>
            </div>
        </div>`).join('');
}

// ── REFRESH ───────────────────────────────────────────────────────────────────
async function doRefresh() {
    const btn   = document.getElementById('refresh-btn');
    const icon  = document.getElementById('refresh-icon');
    const label = document.getElementById('refresh-label');
    const led   = document.getElementById('status-led');

    btn.disabled = true;
    icon.className = 'spinning';
    label.textContent = 'Loading…';
    led.style.background = 'var(--gcc)';
    showSkeletons();

    try {
        const items = await fetchAllFeeds();
        currentCards = buildCards(items);

        // Alert bar — most urgent
        const urgent = currentCards.find(c => c.urgent);
        const alertBar = document.getElementById('alert-bar');
        if (urgent) {
            alertBar.innerHTML = `<span>🚨</span><span>${escHTML(urgent.title)}</span>`;
            alertBar.classList.add('show');
        } else {
            alertBar.classList.remove('show');
        }

        // Update meta
        document.getElementById('meta-source').textContent = workingFeeds.join(' · ');
        document.getElementById('last-updated').textContent = fmtTime(Date.now());
        led.style.background = 'var(--uae)';

        render();
        startAutoRefresh();

    } catch(e) {
        console.error(e);
        led.style.background = 'var(--urgent)';
        document.getElementById('feed').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">⚠️</div>
                <div class="empty-title">Feed Error</div>
                <div class="empty-sub">${escHTML(e.message)}<br><br>Check network and tap Refresh.</div>
            </div>`;
    } finally {
        btn.disabled = false;
        icon.className = '';
        label.textContent = 'Refresh';
    }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
setDayLabel();
doRefresh();
</script>
